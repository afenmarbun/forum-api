limit_req_zone $binary_remote_addr zone=forum_api_threads_limit:10m rate=90r/m;

upstream forum_api_upstream {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name forum-api.bangpenn.my.id;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name forum-api.bangpenn.my.id;

    ssl_certificate /etc/letsencrypt/live/forum-api.bangpenn.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forum-api.bangpenn.my.id/privkey.pem;

    client_max_body_size 1m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";

    limit_req_status 429;

    location = /threads {
        limit_req zone=forum_api_threads_limit;
        proxy_pass http://forum_api_upstream;
    }

    location ^~ /threads/ {
        limit_req zone=forum_api_threads_limit;
        proxy_pass http://forum_api_upstream;
    }

    location / {
        proxy_pass http://forum_api_upstream;
    }
}