name: Continuous Deployment

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "${{ secrets.SSH_HOST }}" || (echo "Missing secret: SSH_HOST" && exit 1)
          test -n "${{ secrets.SSH_PORT }}" || (echo "Missing secret: SSH_PORT" && exit 1)
          test -n "${{ secrets.SSH_USERNAME }}" || (echo "Missing secret: SSH_USERNAME" && exit 1)
          test -n "${{ secrets.SSH_PRIVATE_KEY_B64 }}" || (echo "Missing secret: SSH_PRIVATE_KEY_B64" && exit 1)

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" << 'EOF'
          set -e

          cd /var/www/forum-api

          git fetch origin
          git reset --hard origin/main

          npm ci --omit=dev
          npm run migrate:prod

          pm2 startOrReload ecosystem.config.cjs --update-env
          pm2 save
          EOF